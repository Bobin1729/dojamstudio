<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobin Icecream Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 스케치 느낌의 시원한 배경 그라데이션 */
            background: linear-gradient(180deg, #e0f2ff 0%, #4facfe 100%);
            min-height: 100vh;
            font-family: 'Nanum Pen Script', cursive;
            color: #2c3e50;
        }

        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo {
            font-family: 'Fredoka One', cursive;
            color: #7a9cff;
            line-height: 1;
            text-shadow: 2px 2px 0px white;
        }

        .logo h1 { margin: 0; font-size: 4rem; }
        .logo p { margin: 0; font-size: 1.5rem; letter-spacing: 2px; }

        .menu-icon {
            font-size: 2.5rem;
            cursor: pointer;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* 아이스크림 아이템 공통 스타일 */
        .icecream-item {
            display: flex;
            align-items: center;
            margin-bottom: -20px; /* 지그재그를 위해 살짝 겹침 */
            width: 100%;
        }

        /* 홀수 번째: 사진 왼쪽, 이름 오른쪽 */
        .icecream-item:nth-child(odd) {
            flex-direction: row;
        }

        /* 짝수 번째: 이름 왼쪽, 사진 오른쪽 (스케치 반영) */
        .icecream-item:nth-child(even) {
            flex-direction: row-reverse;
        }

        .circle-img {
            width: 250px;
            height: 250px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 8px solid #b5caff;
            border-radius: 50%; /* 동그라미 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            z-index: 2;
        }

        .circle-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .name-tag {
            font-size: 2.5rem;
            padding: 0 40px;
            z-index: 1;
        }

    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1>Bobin</h1>
        <p>AND THE<br>ICECREAM FACTORY</p>
    </div>
    <div class="menu-icon">≡</div>
</header>

<div class="container" id="factory-list">
    </div>

<script>
    const container = document.getElementById('factory-list');
    const flavors = [
        "바닐라 구름", "딸기 솜사탕", "민트 초코칩", "초코 폭포", 
        "피스타치오 숲", "망고 샤베트", "쿠키앤크림", "블루베리 요정",
        "레몬 톡톡", "아몬드 봉봉"
    ];

    flavors.forEach((name, index) => {
        const item = document.createElement('div');
        item.className = 'icecream-item';
        
        item.innerHTML = `
            <div class="circle-img">아이스크림 사진</div>
            <div class="name-tag">${name}</div>
        `;
        
        container.appendChild(item);
    });
</script>

</body>
</html>
