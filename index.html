<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobin shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Sans+KR:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            color: #333;
            overflow-x: hidden; /* 메뉴가 나올 때 가로 스크롤 방지 */
        }

        /* 헤더 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 40px;
            background: #fff;
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            letter-spacing: -1px;
            color: #000;
        }

        .menu-btn {
            text-align: center;
            cursor: pointer;
            z-index: 1001; /* 메뉴창보다 위에 표시 */
        }

        .menu-btn span {
            display: block;
            font-size: 1.8rem;
            line-height: 0.8;
            margin-bottom: 5px;
        }

        .divider {
            height: 5px;
            background-color: #000;
            margin: 0 25px;
        }

        /* --- 사이드 메뉴 스타일 --- */
        .side-menu {
            position: fixed;
            top: 0;
            right: -300px; /* 처음에는 화면 밖에 숨김 */
            width: 280px;
            height: 100%;
            background-color: #c9ad93; /* 스케치의 갈색톤 */
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: right 0.4s ease; /* 자연스러운 움직임 */
            z-index: 1000;
            padding: 40px 30px;
            box-sizing: border-box;
            border-radius: 20px 0 0 20px; /* 스케치 느낌의 둥근 모서리 */
        }

        .side-menu.active {
            right: 0; /* 활성화 시 화면 안으로 들어옴 */
        }

        .side-menu h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }

        .side-menu a {
            display: block;
            text-decoration: none;
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* 배경 어둡게 처리 (메뉴 열렸을 때) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        /* 상품 그리드 */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 60px 30px;
            padding: 0 25px;
        }

        .product-card { text-align: left; }
        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #fdf5d7;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: #aaa;
            border: 1px solid #f0e8c8;
        }

        .product-name { font-size: 1rem; font-weight: 500; margin-bottom: 8px; }
        .buy-link {
            text-decoration: none; color: #000; font-size: 0.85rem;
            border-bottom: 1px solid #000; padding-bottom: 2px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Bobin Shop</div>
    <div class="menu-btn" onclick="toggleMenu()">
        <span>≡</span>
        메뉴
    </div>
</header>

<div class="divider"></div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <h2>Menu</h2>
    <a href="#">고객센터</a>
    <a href="#">마이페이지</a>
    <a href="#">장바구니</a>
</div>

<div class="container" id="product-list"></div>

<script>
    // 메뉴 열고 닫기 함수
    function toggleMenu() {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        menu.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    // 상품 15개 생성
    const container = document.getElementById('product-list');
    for (let i = 1; i <= 15; i++) {
        container.innerHTML += `
            <div class="product-card">
                <div class="product-img">Bobin Item ${i}</div>
                <div class="product-info">
                    <div class="product-name">보빈 상품 No.${i}</div>
                    <a href="https://open.kakao.com/o/sNV7n6li" class="buy-link">구매 문의하기</a>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
